services:
  pubsub:
    image: google/cloud-sdk:latest
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  fakegcs:
    image: fsouza/fake-gcs-server:latest
    command:
      - "-scheme=http"
      - "-port=4443"
      - "-log-level=debug"
      - "-event.bucket=common"
      - "-event.list=finalize,delete,metadataUpdate"
      - "-event.object-prefix=payload"
      - "-event.pubsub-project-id=fake-project"
      - "-event.pubsub-topic=my-topic"
    ports:
      - "4443:4443"
    environment:
      - PUBSUB_EMULATOR_HOST=httpdumpm:8080
      - GRPC_VERBOSITY=DEBUG
      - GRPC_TRACE=all
    depends_on:
      - pubsub
      - httpdump

  bridge:
    build: ./bridge
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - PROJECT_ID=fake-project
      - SUBSCRIPTION=my-sub
      - TOPIC=my-topic
      - TARGET_URL=http://pubsub:8080/
    depends_on:
      - pubsub

  httpdump:
    image: daime/http-dump:latest
    ports:
      - "8080:8080"
