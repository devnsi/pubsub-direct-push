syntax = "proto3";

package google.pubsub.v1;

option go_package = "./handler";

import "google/protobuf/timestamp.proto";

service Publisher {
  // Receives one or more messages for a given topic.
  rpc Publish(PublishRequest) returns (PublishResponse);
}

message PublishRequest {
  // Full topic name, e.g. "projects/myproj/topics/mytopic"
  string topic = 1;
  repeated PubsubMessage messages = 2;
}

message PubsubMessage {
  string data = 1;                           // Base64‐encoded payload
  map<string, string> attributes = 2;         // Optional user metadata
  string message_id = 3;                     // Client‐side ID (optional)
  google.protobuf.Timestamp publish_time = 4;
}

message PublishResponse {
  // Server-assigned IDs (we just echo client IDs or generate stubs)
  repeated string message_ids = 1;
}
